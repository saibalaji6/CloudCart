spring:
  application:
    name: cloudcart-backend

  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_GMAIL_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: jdbc:postgresql://postgres:5432/cloudcartdb
    username: postgres
    password: YOUR_DATABASE_PASSWORD

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

jwt:
  secret: YOUR_JWT_SECRET

twilio:
  account-sid: YOUR_TWILIO_ACCOUNT_SID
  auth-token: YOUR_TWILIO_AUTH_TOKEN
  phone-number: YOUR_TWILIO_PHONE_NUMBER

stripe:
  secret-key: YOUR_STRIPE_SECRET_KEY